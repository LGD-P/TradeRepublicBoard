name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-audit:
    name: npm audit (shipped deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Only the production (shipped) dependencies gate the build; dev-toolchain
      # advisories don't affect the static output.
      - name: core
        working-directory: packages/core
        run: npm ci && npm audit --omit=dev --audit-level=high
      - name: web
        working-directory: packages/web
        run: npm ci && npm audit --omit=dev --audit-level=high

  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit
      - run: pip-audit -r requirements.txt
