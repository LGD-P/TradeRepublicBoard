name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Python core & fixtures
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install openpyxl pytest
      - name: Run tests (ingestion + model contract)
        run: python -m pytest -q

  # The TypeScript core (packages/core) will get its own job here in Phase 1,
  # running vitest against the SAME fixtures/ so the two cores can never drift.
