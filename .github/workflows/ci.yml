name: CI

on:
  push:
  pull_request:

jobs:
  python:
    name: Python core & fixtures
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install openpyxl pytest
      - name: Run tests (ingestion + model contract)
        run: python -m pytest -q

  typescript:
    name: TypeScript core & fixtures
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/core/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - name: Run vitest against the shared fixtures
        run: npm test

  web:
    name: Web app build & check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install core (source dependency of the web app)
        run: npm ci
        working-directory: packages/core
      - name: Install web
        run: npm ci
        working-directory: packages/web
      - name: Type-check
        run: npm run check
        working-directory: packages/web
      - name: Build (static)
        run: npm run build
        working-directory: packages/web
