server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (the Content-Security-Policy is emitted by the app itself
    # as a hashed meta tag, so it is not duplicated here).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Long-lived, content-hashed assets.
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any unknown path is served the app shell (client routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
